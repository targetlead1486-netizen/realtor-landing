<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо! Переходите в Telegram</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-soft);
      padding: 24px;
    }

    .ty-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 64px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ty-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }

    .ty-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .ty-text {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .ty-text strong {
      color: var(--text);
    }

    .ty-back {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .ty-back a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 480px) {
      .ty-card {
        padding: 40px 24px;
      }

      .ty-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="ty-card">
    <span class="ty-icon">🎬</span>
    <h1 class="ty-title">Вы на верном пути!</h1>
    <p class="ty-text">
      Переходите в Telegram-канал <strong>«Заметки Максима»</strong> —
      там уже ждёт бесплатное видео о 4 источниках клиентов для риелторов.
    </p>
    <a
      href="https://t.me/zametkimaksima"
      target="_blank"
      rel="noopener"
      class="btn btn-lg"
      style="display:inline-flex;width:auto;"
    >
      Открыть Telegram →
    </a>
    <p class="ty-back">
      Вернуться на <a href="index.html">главную страницу</a>
    </p>
  </div>
</body>
</html>
